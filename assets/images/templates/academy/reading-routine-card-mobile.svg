<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 1420" role="img" aria-labelledby="title desc">
  <title id="title">영어문제 5단계 독해 루틴 모바일 이미지</title>
  <desc id="desc">모바일 화면에서 읽기 쉬운 세로형 영어 독해 풀이 루틴 이미지</desc>
  <defs>
    <linearGradient id="head" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6d65d8"/>
      <stop offset=".48" stop-color="#68c2cf"/>
      <stop offset="1" stop-color="#e27668"/>
    </linearGradient>
    <linearGradient id="paperBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f4ff"/>
      <stop offset="1" stop-color="#eef9f8"/>
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-12%" width="120%" height="124%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#4b4280" flood-opacity=".10"/>
    </filter>
    <style>
      text {
        font-family: Pretendard, "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif;
        letter-spacing: -0.045em;
      }
      .ink { fill: #202034; }
      .muted { fill: #6f747c; }
      .blue { fill: #6d65d8; }
      .teal { fill: #5fbfca; }
      .bold { font-weight: 900; }
      .heavy { font-weight: 950; }
    </style>
  </defs>

  <rect width="760" height="1420" rx="30" fill="#fffdfa"/>
  <rect width="760" height="128" rx="30" fill="url(#head)"/>
  <path d="M358 126h44l-22 28z" fill="url(#head)"/>
  <text x="380" y="58" text-anchor="middle" fill="#fff" font-size="35" class="heavy">영어문제는</text>
  <text x="380" y="98" text-anchor="middle" fill="#fff" font-size="35" class="heavy">이렇게 풉니다</text>
  <text x="380" y="174" text-anchor="middle" font-size="23" class="blue heavy">5단계 독해 루틴</text>

  <g transform="translate(44 216)">
    <rect width="672" height="570" rx="30" fill="url(#paperBg)" stroke="#e3e0f4" stroke-width="1.5" filter="url(#softShadow)"/>
    <rect x="34" y="36" width="604" height="236" rx="24" fill="#fff" stroke="#dcebee" stroke-width="1.5"/>
    <text x="68" y="87" font-size="26" class="blue heavy">Reading Note</text>
    <rect x="68" y="116" width="504" height="54" rx="27" fill="#eeeafa"/>
    <rect x="68" y="136" width="110" height="31" rx="8" fill="#bedee6"/>
    <text x="82" y="139" font-size="17" class="blue bold">핵심어</text>
    <text x="82" y="160" font-size="27" class="ink heavy">However</text>
    <text x="190" y="160" font-size="27" class="ink heavy">, the speaker changes</text>
    <text x="68" y="205" font-size="27" class="ink heavy">her opinion after seeing the result.</text>
    <rect x="68" y="226" width="504" height="46" rx="10" fill="#8fd0dd"/>
    <text x="82" y="256" font-size="20" class="ink heavy">근거 일치: 마지막 문장 확인</text>

    <g transform="translate(34 304)">
      <rect width="604" height="66" rx="18" fill="#fff" stroke="#dfe7ef" stroke-width="1.5"/>
      <circle cx="42" cy="33" r="22" fill="#f1f3f4"/>
      <text x="42" y="41" text-anchor="middle" font-size="18" class="muted heavy">A</text>
      <text x="82" y="42" font-size="21" class="muted bold">본문 내용과 반대되는 선택지</text>
    </g>
    <g transform="translate(34 392)">
      <rect width="604" height="66" rx="18" fill="#fff" stroke="#dfe7ef" stroke-width="1.5"/>
      <circle cx="42" cy="33" r="22" fill="#f1f3f4"/>
      <text x="42" y="41" text-anchor="middle" font-size="18" class="muted heavy">B</text>
      <text x="82" y="42" font-size="21" class="muted bold">근거가 부족한 선택지</text>
    </g>
    <g transform="translate(34 480)">
      <rect width="604" height="66" rx="18" fill="#fff" stroke="#b9b2f3" stroke-width="2"/>
      <circle cx="42" cy="33" r="22" fill="#6d65d8"/>
      <text x="42" y="41" text-anchor="middle" font-size="18" fill="#fff" class="heavy">C</text>
      <text x="82" y="42" font-size="21" class="ink heavy">본문 근거와 연결되는 선택지</text>
      <rect x="512" y="20" width="58" height="26" rx="13" fill="#eaf8f7"/>
      <text x="541" y="39" text-anchor="middle" font-size="14" class="teal heavy">정답</text>
    </g>
  </g>

  <g transform="translate(44 836)">
    <g>
      <rect width="672" height="78" rx="18" fill="#fff" stroke="#e3e0f4"/>
      <text x="34" y="49" font-size="25" class="blue heavy">1차 구문</text>
      <text x="180" y="49" font-size="23" class="ink heavy">문장 구조 표시</text>
    </g>
    <path d="M336 82v8" stroke="#e27668" stroke-width="3" stroke-linecap="round"/>
    <path d="M329 88l7 9 7-9" fill="#e27668"/>
    <g transform="translate(0 92)">
      <rect width="672" height="78" rx="18" fill="#fff" stroke="#e3e0f4"/>
      <text x="34" y="49" font-size="25" class="blue heavy">2차 단서</text>
      <text x="180" y="49" font-size="23" class="ink heavy">핵심어와 연결어 정리</text>
    </g>
    <path d="M336 174v8" stroke="#e27668" stroke-width="3" stroke-linecap="round"/>
    <path d="M329 180l7 9 7-9" fill="#e27668"/>
    <g transform="translate(0 184)">
      <rect width="672" height="78" rx="18" fill="#fff" stroke="#e3e0f4"/>
      <text x="34" y="49" font-size="25" class="blue heavy">3차 위치</text>
      <text x="180" y="49" font-size="23" class="ink heavy">정답 근거 위치 찾기</text>
    </g>
    <path d="M336 266v8" stroke="#e27668" stroke-width="3" stroke-linecap="round"/>
    <path d="M329 272l7 9 7-9" fill="#e27668"/>
    <g transform="translate(0 276)">
      <rect width="672" height="78" rx="18" fill="#fff" stroke="#e3e0f4"/>
      <text x="34" y="49" font-size="25" class="blue heavy">4차 소거</text>
      <text x="180" y="49" font-size="23" class="ink heavy">틀린 선택지 제거</text>
    </g>
    <path d="M336 358v8" stroke="#e27668" stroke-width="3" stroke-linecap="round"/>
    <path d="M329 364l7 9 7-9" fill="#e27668"/>
    <g transform="translate(0 368)">
      <rect width="672" height="78" rx="18" fill="#fff" stroke="#e3e0f4"/>
      <text x="34" y="49" font-size="25" class="blue heavy">5차 확인</text>
      <text x="180" y="49" font-size="23" class="ink heavy">정답과 근거 연결</text>
    </g>
    <path d="M336 450v8" stroke="#e27668" stroke-width="3" stroke-linecap="round"/>
    <path d="M329 456l7 9 7-9" fill="#e27668"/>
    <g transform="translate(0 460)">
      <rect width="672" height="78" rx="18" fill="#fff" stroke="#e3e0f4"/>
      <text x="34" y="49" font-size="25" class="blue heavy">최종 답안</text>
      <text x="180" y="49" font-size="23" class="ink heavy">설명 가능한 정답 완성</text>
    </g>
  </g>
</svg>
